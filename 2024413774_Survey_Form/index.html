<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Tech Survey</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            margin-top: 20px;
            color: #00d2ff;
        }
        #description {
            font-style: italic;
            margin-bottom: 30px;
            color: #94a3b8;
        }
        form {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #0f3460;
            background-color: #0f3460;
            color: white;
            box-sizing: border-box;
        }
        input:focus {
            outline: 2px solid #00d2ff;
        }
        .inline-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            font-weight: normal;
        }
        input[type="radio"], input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }
        #submit {
            width: 100%;
            padding: 15px;
            background-color: #00d2ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        #submit:hover {
            background-color: #3a7bd5;
        }
    </style>
</head>
<body>

    <h1 id="title">Campus Tech Interest Survey</h1>
    <p id="description">Help us understand the technology needs of students on campus.</p>

    <form id="survey-form">
        <div class="form-group">
            <label id="name-label" for="name">Name</label>
            <input 
                id="name" 
                type="text" 
                placeholder="Enter your full name" 
                required>
        </div>

        <div class="form-group">
            <label id="email-label" for="email">Email</label>
            <input 
                id="email" 
                type="email" 
                placeholder="Enter your student email" 
                required>
        </div>

        <div class="form-group">
            <label id="number-label" for="number">Years of Study</label>
            <input 
                id="number" 
                type="number" 
                min="1" 
                max="7" 
                placeholder="1 - 7" 
                required>
        </div>

        <div class="form-group">
            <label for="dropdown">Primary Major</label>
            <select id="dropdown" name="major">
                <option value="" disabled selected>Select your field</option>
                <option value="cs">Computer Science</option>
                <option value="engineering">Engineering</option>
                <option value="arts">Arts & Humanities</option>
                <option value="business">Business</option>
            </select>
        </div>

        <div class="form-group">
            <label>Preferred Operating System</label>
            <label class="inline-group">
                <input type="radio" name="os-pref" value="windows" checked> Windows
            </label>
            <label class="inline-group">
                <input type="radio" name="os-pref" value="macos"> macOS
            </label>
            <label class="inline-group">
                <input type="radio" name="os-pref" value="linux"> Linux
            </label>
        </div>

        <div class="form-group">
            <label>Interests (Check all that apply)</label>
            <label class="inline-group">
                <input type="checkbox" name="interest" value="web-dev"> Web Development
            </label>
            <label class="inline-group">
                <input type="checkbox" name="interest" value="ai"> Artificial Intelligence
            </label>
            <label class="inline-group">
                <input type="checkbox" name="interest" value="gaming"> Mobile Gaming
            </label>
            <label class="inline-group">
                <input type="checkbox" name="interest" value="cybersecurity"> Cybersecurity
            </label>
        </div>

        <div class="form-group">
            <label for="comments">Any additional tech requests for the campus?</label>
            <textarea id="comments" name="comments" rows="4" placeholder="Enter your comments here..."></textarea>
        </div>

        <button id="submit" type="submit">Submit Survey</button>
    </form>

</body>
</html>
